name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  # ─── Build & test ───────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore api/SimianBookings.csproj

      - name: Build
        run: dotnet build api/SimianBookings.csproj --no-restore -c Release

      - name: Test
        run: dotnet test tests/SimianBookings.Tests/SimianBookings.Tests.csproj --no-build -c Debug --logger "console;verbosity=normal"

  # ─── Deploy Function App ────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Function App
        run: dotnet publish api/SimianBookings.csproj -c Release -o ./publish

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: simian-bookings-api
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  # ─── Deploy Static Web App ──────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Generate runtime API config
        run: |
          API_BASE_URL="${{ vars.PROD_API_BASE_URL }}"
          if [ -z "$API_BASE_URL" ]; then
            API_BASE_URL="https://simian-bookings-api.azurewebsites.net/api"
          fi

          cat > web/runtime-config.js <<EOF
          window.SIMIAN_CONFIG = {
            apiBase: "$API_BASE_URL"
          };
          EOF

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /web
          skip_app_build: true
