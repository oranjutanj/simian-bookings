<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Session | Simian Coaching</title>
  <style>
    :root {
      --dark:  #157266;
      --med:   #0EB69F;
      --light: #BCE1C6;
      --white: #ffffff;
      --text:  #1a1a1a;
      --muted: #555;
      --radius: 10px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f9f6;
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--dark);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header img { height: 48px; }
    header h1 { color: var(--white); font-size: 1.4rem; font-weight: 600; }
    header p { color: var(--light); font-size: 0.85rem; margin-top: 2px; }

    main {
      max-width: 680px;
      margin: 2rem auto;
      padding: 0 1rem 4rem;
    }

    .step { display: none; }
    .step.active { display: block; }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    h2 {
      color: var(--dark);
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
    }

    /* Session type cards */
    .session-grid { display: flex; flex-direction: column; gap: 1rem; }

    .session-card {
      border: 2px solid var(--light);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .session-card:hover { border-color: var(--med); background: #f0fdf9; }
    .session-card.selected { border-color: var(--dark); background: #e8f7f2; }
    .session-card h3 { color: var(--dark); font-size: 1rem; margin-bottom: 0.3rem; }
    .session-card .duration {
      display: inline-block;
      background: var(--light);
      color: var(--dark);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 0.5rem;
    }
    .session-card p { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }

    /* Slots */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .week-nav button {
      background: none;
      border: 1.5px solid var(--light);
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      color: var(--dark);
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    .week-nav button:hover { background: var(--light); }
    .week-nav span { font-weight: 600; color: var(--dark); }

    .day-group { margin-bottom: 1.2rem; }
    .day-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .slots-row { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .slot-btn {
      background: var(--white);
      border: 1.5px solid var(--light);
      border-radius: 8px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--dark);
      transition: background 0.15s, border-color 0.15s;
    }
    .slot-btn:hover { background: #f0fdf9; border-color: var(--med); }
    .slot-btn.selected { background: var(--dark); color: var(--white); border-color: var(--dark); }
    .no-slots { color: var(--muted); font-size: 0.9rem; }

    /* Form */
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--dark); margin-bottom: 0.4rem; }
    input, textarea {
      width: 100%;
      border: 1.5px solid #d0e8e0;
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--med);
    }
    textarea { resize: vertical; min-height: 80px; }

    .booking-summary {
      background: #f0fdf9;
      border: 1.5px solid var(--light);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .booking-summary strong { color: var(--dark); }

    /* Buttons */
    .btn {
      display: inline-block;
      background: var(--dark);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--med); }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .btn-secondary {
      background: none;
      color: var(--dark);
      border: 1.5px solid var(--light);
    }
    .btn-secondary:hover { background: var(--light); }

    .btn-row { display: flex; gap: 1rem; align-items: center; margin-top: 1.5rem; }

    /* Success */
    .success-icon { font-size: 3rem; margin-bottom: 1rem; }
    .teams-link {
      display: inline-block;
      margin-top: 1rem;
      background: #5059c9;
      color: white;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .teams-link:hover { background: #3b4db8; }

    /* Loading */
    .loading { text-align: center; padding: 2rem; color: var(--muted); }
    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid var(--light);
      border-top-color: var(--dark);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 0.8rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fff0f0;
      border: 1.5px solid #ffaaaa;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      color: #c0392b;
      font-size: 0.88rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<header>
  <img src="assets/Simian Coaching Logo_Icon Whiteout.png" alt="Simian Coaching" />
  <div>
    <h1>Book a Session</h1>
    <p>simiancoaching.co.uk</p>
  </div>
</header>

<main>

  <!-- Step 1: Choose session type -->
  <div class="step active" id="step-1">
    <div class="card">
      <h2>What type of session would you like?</h2>
      <div class="session-grid" id="session-list">
        <div class="loading"><div class="spinner"></div><br/>Loading sessions…</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-to-step-2" disabled>Choose a time →</button>
    </div>
  </div>

  <!-- Step 2: Choose a slot -->
  <div class="step" id="step-2">
    <div class="card">
      <h2>Pick a date and time</h2>
      <div class="week-nav">
        <button id="btn-prev-week">← Prev</button>
        <span id="week-label"></span>
        <button id="btn-next-week">Next →</button>
      </div>
      <div id="slots-container">
        <div class="loading"><div class="spinner"></div><br/>Checking availability…</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goTo(1)">← Back</button>
      <button class="btn" id="btn-to-step-3" disabled>Continue →</button>
    </div>
  </div>

  <!-- Step 3: Your details -->
  <div class="step" id="step-3">
    <div class="card">
      <h2>Your details</h2>
      <div class="booking-summary" id="booking-summary"></div>
      <div class="form-group">
        <label for="input-name">Full name *</label>
        <input type="text" id="input-name" placeholder="Your name" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="input-email">Email address *</label>
        <input type="email" id="input-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="input-message">Anything you'd like me to know? (optional)</label>
        <textarea id="input-message" placeholder="Topics you'd like to focus on, context, questions…"></textarea>
      </div>
      <div id="form-error"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goTo(2)">← Back</button>
      <button class="btn" id="btn-confirm" onclick="confirmBooking()">Confirm booking</button>
    </div>
  </div>

  <!-- Step 4: Confirmation -->
  <div class="step" id="step-4">
    <div class="card" style="text-align:center;">
      <div class="success-icon">✅</div>
      <h2 style="font-size:1.4rem; margin-bottom:0.8rem;">You're booked!</h2>
      <p style="color:var(--muted); line-height:1.6;" id="confirm-text"></p>
      <br/>
      <a id="teams-link-btn" href="#" target="_blank" class="teams-link" style="display:none">Join on Microsoft Teams</a>
    </div>
  </div>

</main>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  // In production this points to your deployed Azure Function URL.
  // For local dev, the Functions host runs on 7071.
  const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:7071/api'
    : '/api';

  // ── State ───────────────────────────────────────────────────────────────────
  let sessions = [];
  let selectedSession = null;
  let allSlots = [];        // all UTC slot strings for the selected session
  let selectedSlot = null;  // UTC ISO string
  let weekOffset = 0;       // 0 = this week's slots, 1 = next week etc

  // ── Boot ────────────────────────────────────────────────────────────────────
  (async () => {
    try {
      const res = await fetch(`${API_BASE}/session-types`);
      sessions = await res.json();
      renderSessions();
    } catch (e) {
      document.getElementById('session-list').innerHTML =
        '<div class="error-msg">Could not load sessions. Please refresh the page.</div>';
    }
  })();

  // ── Session types ────────────────────────────────────────────────────────────
  function renderSessions() {
    const el = document.getElementById('session-list');
    el.innerHTML = sessions.map(s => `
      <div class="session-card" data-id="${s.id}" onclick="selectSession('${s.id}')">
        <span class="duration">${s.durationMinutes} min</span>
        <h3>${s.name}</h3>
        <p>${s.description}</p>
      </div>
    `).join('');
  }

  function selectSession(id) {
    selectedSession = sessions.find(s => s.id === id);
    document.querySelectorAll('.session-card').forEach(c =>
      c.classList.toggle('selected', c.dataset.id === id));
    document.getElementById('btn-to-step-2').disabled = false;
  }

  // ── Slots ────────────────────────────────────────────────────────────────────
  async function loadSlots() {
    document.getElementById('slots-container').innerHTML =
      '<div class="loading"><div class="spinner"></div><br/>Checking availability…</div>';
    try {
      const res = await fetch(`${API_BASE}/slots?sessionType=${selectedSession.id}&weeksAhead=4`);
      const data = await res.json();
      allSlots = data.availableSlots;
      weekOffset = 0;
      renderSlots();
    } catch (e) {
      document.getElementById('slots-container').innerHTML =
        '<div class="error-msg">Could not load availability. Please try again.</div>';
    }
  }

  function getWeekSlots() {
    // Group all slots and return those in the current weekOffset window
    const now = new Date();
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() + weekOffset * 7);
    weekStart.setHours(0, 0, 0, 0);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 7);
    return allSlots.filter(s => {
      const d = new Date(s);
      return d >= weekStart && d < weekEnd;
    });
  }

  function renderSlots() {
    const weekSlots = getWeekSlots();
    updateWeekLabel();

    if (weekSlots.length === 0) {
      document.getElementById('slots-container').innerHTML =
        '<p class="no-slots">No available slots this week — try the next week.</p>';
      return;
    }

    // Group by local date
    const groups = {};
    weekSlots.forEach(s => {
      const local = new Date(s);
      const key = local.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
      if (!groups[key]) groups[key] = [];
      groups[key].push(s);
    });

    const html = Object.entries(groups).map(([day, slots]) => `
      <div class="day-group">
        <div class="day-label">${day}</div>
        <div class="slots-row">
          ${slots.map(s => `
            <button class="slot-btn${s === selectedSlot ? ' selected' : ''}"
              data-slot="${s}"
              onclick="selectSlot('${s}')">
              ${new Date(s).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}
            </button>
          `).join('')}
        </div>
      </div>
    `).join('');

    document.getElementById('slots-container').innerHTML = html;
  }

  function selectSlot(utcSlot) {
    selectedSlot = utcSlot;
    document.querySelectorAll('.slot-btn').forEach(b =>
      b.classList.toggle('selected', b.dataset.slot === utcSlot));
    document.getElementById('btn-to-step-3').disabled = false;
  }

  function updateWeekLabel() {
    const now = new Date();
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() + weekOffset * 7);
    weekStart.setHours(0, 0, 0, 0);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);

    const fmt = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    document.getElementById('week-label').textContent = `${fmt(weekStart)} – ${fmt(weekEnd)}`;
    document.getElementById('btn-prev-week').disabled = weekOffset <= 0;
  }

  document.getElementById('btn-prev-week').onclick = () => {
    if (weekOffset > 0) { weekOffset--; renderSlots(); }
  };
  document.getElementById('btn-next-week').onclick = () => {
    weekOffset++;
    renderSlots();
  };

  // ── Navigation ───────────────────────────────────────────────────────────────
  function goTo(step) {
    document.querySelectorAll('.step').forEach((el, i) =>
      el.classList.toggle('active', i + 1 === step));

    if (step === 2) {
      loadSlots();
    }
    if (step === 3) {
      const start = new Date(selectedSlot);
      const end = new Date(start.getTime() + selectedSession.durationMinutes * 60000);
      const fmt = d => d.toLocaleString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit'
      });
      document.getElementById('booking-summary').innerHTML = `
        <strong>${selectedSession.name}</strong><br/>
        ${fmt(start)} – ${end.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}
      `;
    }
  }

  document.getElementById('btn-to-step-2').onclick = () => goTo(2);
  document.getElementById('btn-to-step-3').onclick = () => goTo(3);

  // ── Confirm booking ──────────────────────────────────────────────────────────
  async function confirmBooking() {
    const name = document.getElementById('input-name').value.trim();
    const email = document.getElementById('input-email').value.trim();
    const message = document.getElementById('input-message').value.trim();
    const errorEl = document.getElementById('form-error');

    if (!name || !email) {
      errorEl.innerHTML = '<div class="error-msg">Please fill in your name and email address.</div>';
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errorEl.innerHTML = '<div class="error-msg">Please enter a valid email address.</div>';
      return;
    }
    errorEl.innerHTML = '';

    const btn = document.getElementById('btn-confirm');
    btn.disabled = true;
    btn.textContent = 'Booking…';

    try {
      const res = await fetch(`${API_BASE}/bookings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionTypeId: selectedSession.id,
          startTimeUtc: selectedSlot,
          attendeeName: name,
          attendeeEmail: email,
          message: message || null
        })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        errorEl.innerHTML = `<div class="error-msg">${data.error || 'Something went wrong. Please try again.'}</div>`;
        btn.disabled = false;
        btn.textContent = 'Confirm booking';
        return;
      }

      // Success!
      const start = new Date(selectedSlot);
      const end = new Date(start.getTime() + selectedSession.durationMinutes * 60000);
      document.getElementById('confirm-text').innerHTML = `
        <strong>${name}</strong>, your <strong>${selectedSession.name}</strong> is confirmed for<br/>
        <strong>${start.toLocaleString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' })}</strong>.<br/><br/>
        A calendar invite has been sent to <strong>${email}</strong>.
      `;

      if (data.teamsLink) {
        const link = document.getElementById('teams-link-btn');
        link.href = data.teamsLink;
        link.style.display = 'inline-block';
      }

      goTo(4);
    } catch (e) {
      errorEl.innerHTML = '<div class="error-msg">Could not connect to the booking service. Please try again.</div>';
      btn.disabled = false;
      btn.textContent = 'Confirm booking';
    }
  }
</script>
</body>
</html>
